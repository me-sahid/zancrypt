server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 5G;

    # Keep connections alive — reduces per-request TCP overhead
    keepalive_timeout 75s;
    keepalive_requests 1000;

    # Gzip Compression Engine
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;

    location / {
        try_files $uri $uri/ /index.html;
        # No cache for HTML (always fresh SPA entry)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~ ^/(auth|files|admin|health|api) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        # Generous timeouts to prevent 502 flashes under load
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # Immutable cache for hashed static assets (JS/CSS chunks from Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
